<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家族カレンダー</title>
  
  <!-- スマホでアプリらしく見せるための設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <style>
    /* 全体のリセット */
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body {
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 10px;
    }

    /* スマホサイズコンテナ */
    .app-container {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 580px;
      position: relative;
    }

    /* 月切り替え付きヘッダー */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      background: #fff;
    }

    .header h2 {
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }

    .nav-btn {
      background: #f0f2f5;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #555;
    }
    .nav-btn:active {
      background: #e4e6eb;
    }

    /* カレンダーエリア */
    .calendar-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 6px;
    }

    .weekdays-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }

    .weekday {
      text-align: center;
      font-size: 11px;
      font-weight: bold;
      color: #666;
      padding: 4px 0;
    }
    .weekday:nth-child(1) { color: #dc3545; }
    .weekday:nth-child(7) { color: #007bff; }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      flex: 1;
    }

    .day-cell {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 4px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      position: relative;
      height: 62px;
    }
    .day-cell.empty {
      background: transparent;
      cursor: default;
    }
    .day-cell:not(.empty):active {
      background: #e9ecef;
    }

    .day-num {
      font-size: 11px;
      font-weight: 600;
      color: #333;
    }
    .day-cell.sunday .day-num { color: #dc3545; }
    .day-cell.saturday .day-num { color: #007bff; }
    .day-cell.holiday .day-num { color: #dc3545; }

    .holiday-name {
      font-size: 7px;
      color: #dc3545;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      position: absolute;
      top: 4px;
      right: 4px;
      font-weight: bold;
    }

    .badge-container {
      width: 100%;
      margin-top: auto;
    }

    .badge {
      font-size: 9px;
      color: white;
      padding: 1px 2px;
      border-radius: 4px;
      text-align: center;
      font-weight: bold;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      width: 100%;
      display: block;
      animation: popIn 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .bg-kotonoha { background-color: #007bff; }
    .bg-aiai { background-color: #28a745; }
    .bg-yasumi { background-color: #dc3545; }

    /* 下部：アイコン選択エリア */
    .dock {
      background: #f8f9fa;
      border-top: 1px solid #eee;
      padding: 10px;
      display: flex;
      justify-content: space-around;
      gap: 6px;
    }

    .icon-btn {
      flex: 1;
      border: 2px solid transparent;
      background: white;
      padding: 8px 2px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      transition: all 0.2s ease;
    }

    .icon-btn .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .icon-btn span {
      font-size: 10px;
      font-weight: bold;
      color: #555;
    }

    .icon-btn.active {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }
    .icon-btn.active[data-type="kotonoha"] { border-color: #007bff; background: #f0f7ff; }
    .icon-btn.active[data-type="aiai"] { border-color: #28a745; background: #f0f9f1; }
    .icon-btn.active[data-type="yasumi"] { border-color: #dc3545; background: #fff5f5; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <button class="nav-btn" id="prevMonth">◀</button>
    <h2 id="monthTitle">2026年 7月</h2>
    <button class="nav-btn" id="nextMonth">▶</button>
  </div>
 
  <div class="calendar-container">
    <div class="weekdays-grid">
      <div class="weekday">日</div><div class="weekday">月</div><div class="weekday">火</div>
      <div class="weekday">水</div><div class="weekday">木</div><div class="weekday">金</div><div class="weekday">土</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <!-- 🔒 初期状態は「予定1〜3」にして個人情報をガード -->
  <div class="dock">
    <button class="icon-btn active" data-type="kotonoha">
      <div class="dot bg-kotonoha"></div>
      <span>予定1</span>
    </button>
    <button class="icon-btn" data-type="aiai">
      <div class="dot bg-aiai"></div>
      <span>予定2</span>
    </button>
    <button class="icon-btn" data-type="yasumi">
      <div class="dot bg-yasumi"></div>
      <span>予定3</span>
    </button>
  </div>
</div>

<!-- Firebaseのプログラム（仕組み）を読み込む -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // -------------------------------------------------------------
  // Firebase接続設定
  // -------------------------------------------------------------
  const firebaseConfig = {
    apiKey: "AIzaSyA3a9hsSDIqgysl5wdsJy7EslUAnd-OYPs",
    authDomain: "family-calendar-77e9e.firebaseapp.com",
    projectId: "family-calendar-77e9e",
    storageBucket: "family-calendar-77e9e.firebasestorage.app",
    messagingSenderId: "483154113898",
    appId: "1:483154113898:web:bd616fc68b34cc3f44a113"
  };

  // Firebaseの起動
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // -------------------------------------------------------------
  // 🔐 スマホ本体に項目名を記憶させる設定（デフォルトは予定1〜3）
  // -------------------------------------------------------------
  const scheduleMeta = {
    kotonoha: { className: 'bg-kotonoha', label: localStorage.getItem('label-kotonoha') || '予定1' },
    aiai: { className: 'bg-aiai', label: localStorage.getItem('label-aiai') || '予定2' },
    yasumi: { className: 'bg-yasumi', label: localStorage.getItem('label-yasumi') || '予定3' }
  };

  // ボタンの文字を最新の記憶に更新する関数
  function updateButtonLabels() {
    document.querySelector('[data-type="kotonoha"] span').innerText = scheduleMeta.kotonoha.label;
    document.querySelector('[data-type="aiai"] span').innerText = scheduleMeta.aiai.label;
    document.querySelector('[data-type="yasumi"] span').innerText = scheduleMeta.yasumi.label;
  }

  // カレンダーの状態管理（※アプリ起動時の「現在の月」からスタートするように調整）
  let currentDate = new Date();
  let currentType = 'kotonoha';
  let savedEvents = {}; 

  // 祝日判定
  function getHolidayName(year, month, day) {
    const m = month + 1;
    if (m === 1 && day === 1) return '元日';
    if (m === 2 && day === 11) return '建国記念';
    if (m === 2 && day === 23) return '天皇誕生日';
    if (m === 4 && day === 29) return '昭和の日';
    if (m === 5 && day === 3) return '憲法記念日';
    if (m === 5 && day === 4) return 'みどりの日';
    if (m === 5 && day === 5) return 'こどもの日';
    if (m === 8 && day === 11) return '山の日';
    if (m === 11 && day === 3) return '文化の日';
    if (m === 11 && day === 23) return '勤労感謝';
    const dayOfWeek = new Date(year, month, day).getDay();
    const nthWeek = Math.floor((day - 1) / 7) + 1;
    if (dayOfWeek === 1) {
      if (m === 1 && nthWeek === 2) return '成人の日';
      if (m === 7 && nthWeek === 3) return '海の日';
      if (m === 9 && nthWeek === 3) return '敬老の日';
      if (m === 10 && nthWeek === 2) return 'スポーツの日';
    }
    if (year === 2026) {
      if (m === 3 && day === 20) return '春分の日';
      if (m === 9 && day === 23) return '秋分の日';
      if (m === 9 && day === 22) return '振替休日';
    }
    return null;
  }

  // カレンダー画面を描画する処理
  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    document.getElementById('monthTitle').innerText = `${year}年 ${month + 1}月`;
    const daysGrid = document.getElementById('daysGrid');
    daysGrid.innerHTML = '';

    const firstDayIndex = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDayIndex; i++) {
      const emptyCell = document.createElement('div');
      emptyCell.className = 'day-cell empty';
      daysGrid.appendChild(emptyCell);
    }

    for (let day = 1; day <= totalDays; day++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
     
      const dateObj = new Date(year, month, day);
      const dayOfWeek = dateObj.getDay();
      const holidayName = getHolidayName(year, month, day);

      if (dayOfWeek === 0) cell.classList.add('sunday');
      if (dayOfWeek === 6) cell.classList.add('saturday');
      if (holidayName) cell.classList.add('holiday');

      let cellHTML = `<div class="day-num">${day}</div>`;
      if (holidayName) cellHTML += `<div class="holiday-name">${holidayName}</div>`;
      cellHTML += `<div class="badge-container"></div>`;
      cell.innerHTML = cellHTML;

      const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const container = cell.querySelector('.badge-container');
     
      // 予定データがあれば最新の登録名で表示
      if (savedEvents[dateKey]) {
        const type = savedEvents[dateKey];
        const badge = document.createElement('div');
        badge.className = `badge ${scheduleMeta[type].className}`;
        badge.innerText = scheduleMeta[type].label; // 記憶された名前を表示
        container.appendChild(badge);
      }

      // タップした時の処理（Firebaseにデータを保存/削除する）
      cell.addEventListener('click', async () => {
        const docRef = doc(db, "schedules", dateKey);
        if (savedEvents[dateKey] === currentType) {
          await deleteDoc(docRef);
        } else {
          await setDoc(docRef, { type: currentType });
        }
      });

      daysGrid.appendChild(cell);
    }
  }

  // 🌟 リアルタイム同期（Firebaseからデータを自動受信）
  onSnapshot(doc(db, "schedules", "all_events_realtime"), () => {}); 
 
  import { collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  onSnapshot(collection(db, "schedules"), (snapshot) => {
    savedEvents = {}; 
    snapshot.forEach((doc) => {
      savedEvents[doc.id] = doc.data().type; 
    });
    renderCalendar(); 
  });

  // -------------------------------------------------------------
  // 🔘 ボタン操作の設定 ＆ ダブルクリックによるカスタム機能
  // -------------------------------------------------------------
  // 初期化時にボタン名を更新
  updateButtonLabels();

  // 前の月へボタン
  document.getElementById('prevMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
  });

  // 次の月へボタン
  document.getElementById('nextMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
  });

  // 下部ドックのボタン制御
  const buttons = document.querySelectorAll('.icon-btn');
  buttons.forEach(btn => {
    const type = btn.getAttribute('data-type');

    // 通常タップ：選択状態を切り替える
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentType = type;
    });

    // ダブルクリック（トントンと2回タップ）：そのスマホでの登録名を変更する
    btn.addEventListener('dblclick', (e) => {
      e.stopPropagation(); // 通常タップとの重複をガード
      const currentName = scheduleMeta[type].label;
      const newName = prompt(`「${currentName}」の新しい項目名を入力してください：`, currentName);
      
      if (newName && newName.trim() !== "") {
        scheduleMeta[type].label = newName;             // 一時保存
        localStorage.setItem(`label-${type}`, newName); // スマホ本体に永続保存
        updateButtonLabels();                           // ボタン表示を書き換え
        renderCalendar();                               // カレンダー上の文字を再描画
      }
    });
  });

</script>
</body>
</html>
